services:
  postgres:
    image: postgres:16-alpine
    container_name: shopping-list-postgres
    environment:
      POSTGRES_DB: shopping_list
      POSTGRES_USER: shopping_list
      POSTGRES_PASSWORD: shopping_list
    ports:
      - "54321:5432"
    volumes:
      - shopping-list-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping_list -d shopping_list"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  shopping-list-postgres-data:
