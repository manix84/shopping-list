<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Smart Shopping List | Plan Groceries Faster With Routes</title>
    <meta
      name="description"
      content="Paste a shopping list, auto-sort it into store sections, and share a cleaner shopping plan with quantities, sizes, and route metadata."
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Smart Shopping List" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <script>
      (() => {
        const storageKey = 'smart-shopping-list-theme-v1';
        const isDarkMode = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
        let mode = 'system';

        try {
          const stored = localStorage.getItem(storageKey);
          if (stored === 'light' || stored === 'dark' || stored === 'system') {
            mode = stored;
          }
        } catch (error) {
          mode = 'system';
        }

        const resolved = mode === 'system' ? (isDarkMode() ? 'dark' : 'light') : mode;
        document.documentElement.dataset.theme = resolved;

        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute('content', resolved === 'dark' ? '#0b1220' : '#0f172a');
        }
      })();
    </script>

    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icon-192.png" sizes="192x192" />
    <link rel="icon" href="%BASE_URL%icon-512.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Smart Shopping List | Plan Groceries Faster With Routes" />
    <meta
      property="og:description"
      content="Paste a shopping list, auto-sort it into store sections, and share a cleaner shopping plan with quantities, sizes, and route metadata."
    />
    <meta property="og:image" content="%BASE_URL%og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Smart Shopping List preview card" />
    <meta property="og:site_name" content="Smart Shopping List" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smart Shopping List | Plan Groceries Faster With Routes" />
    <meta
      name="twitter:description"
      content="Paste a shopping list, auto-sort it into store sections, and share a cleaner shopping plan with quantities, sizes, and route metadata."
    />
    <meta name="twitter:image" content="%BASE_URL%og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
