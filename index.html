<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Smart Shopping List | Plan Groceries Faster With Routes</title>
    <meta
      name="description"
      content="Paste a shopping list, auto-sort it into store sections, and share a cleaner shopping plan with quantities, sizes, and route metadata."
    />
    <meta name="theme-color" content="#f6f7fb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Smart Shopping List" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link
      id="browser-theme-icon"
      rel="icon"
      type="image/png"
      href="%BASE_URL%favicon-light.png"
      data-light-href="%BASE_URL%favicon-light.png"
      data-dark-href="%BASE_URL%favicon-dark.png"
    />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="mask-icon" href="%BASE_URL%mask-icon.svg" color="#2563eb" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />

    <script>
      (() => {
        const storageKey = 'smart-shopping-list-theme-v1';
        const localeKey = 'smart-shopping-list-locale-v1';
        const isDarkMode = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
        let mode = 'system';
        let locale = 'en';

        try {
          const stored = localStorage.getItem(storageKey);
          if (stored === 'light' || stored === 'dark' || stored === 'system') {
            mode = stored;
          }

          const storedLocale = localStorage.getItem(localeKey);
          if (storedLocale === 'es' || storedLocale === 'en') {
            locale = storedLocale;
          } else if (navigator.language && navigator.language.toLowerCase().startsWith('es')) {
            locale = 'es';
          }
        } catch (error) {
          mode = 'system';
          locale = 'en';
        }

        const resolved = mode === 'system' ? (isDarkMode() ? 'dark' : 'light') : mode;
        const themeColorValue = resolved === 'dark' ? '#0b1220' : '#f6f7fb';
        document.documentElement.dataset.theme = resolved;
        document.documentElement.lang = locale === 'en' ? 'en-GB' : locale;

        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute('content', themeColorValue);
        }

        const browserIcon = document.querySelector('#browser-theme-icon');
        if (browserIcon) {
          const nextIcon = resolved === 'dark' ? browserIcon.dataset.darkHref : browserIcon.dataset.lightHref;
          if (nextIcon) {
            browserIcon.setAttribute('href', nextIcon);
          }
        }
      })();
    </script>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Smart Shopping List | Plan Groceries Faster With Routes" />
    <meta
      property="og:description"
      content="Paste a shopping list, auto-sort it into store sections, and share a cleaner shopping plan with quantities, sizes, and route metadata."
    />
    <meta property="og:image" content="%BASE_URL%og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Smart Shopping List preview card" />
    <meta property="og:site_name" content="Smart Shopping List" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smart Shopping List | Plan Groceries Faster With Routes" />
    <meta
      name="twitter:description"
      content="Paste a shopping list, auto-sort it into store sections, and share a cleaner shopping plan with quantities, sizes, and route metadata."
    />
    <meta name="twitter:image" content="%BASE_URL%og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
