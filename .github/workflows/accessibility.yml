name: Accessibility
run-name: Accessibility

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  accessibility:
    runs-on: ubuntu-latest
    env:
      LIGHTHOUSE_ACCESSIBILITY_MIN: '1'
      LIGHTHOUSE_BEST_PRACTICES_MIN: '0'
      LIGHTHOUSE_PERFORMANCE_MIN: '0'
      LIGHTHOUSE_SEO_MIN: '0'
      LIGHTHOUSE_PRESET: desktop
      VITE_SKIP_BACKEND_CHECKS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Accessibility audit
        run: npm run lighthouse
